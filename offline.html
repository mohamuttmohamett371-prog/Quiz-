<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — Quiz App</title>
<style>
  :root{ --bg:#0a0e27; --accent:#1565ff; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(circle at top, #102055, #060a1c);
    font-family: 'Segoe UI', Roboto, Arial, sans-serif; color:#fff; text-align:center;
  }
  .card{
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(16px);
    border-radius: 24px;
    padding: 40px 32px;
    max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .icon{ font-size: 64px; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
  @keyframes float{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  h1{ font-size: 22px; margin-bottom: 8px; }
  p{ font-size: 14px; opacity: 0.75; line-height: 1.6; margin-bottom: 24px; }
  button{
    background: linear-gradient(135deg, #1565ff, #0a2dff);
    border:none; color:#fff; padding: 12px 28px; border-radius: 14px;
    font-size: 15px; font-weight:600; cursor:pointer;
    box-shadow: 0 8px 24px rgba(21,101,255,0.4);
    transition: transform .2s ease;
  }
  button:active{ transform: scale(0.96); }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry — your saved quizzes and progress are still safe on this device.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
